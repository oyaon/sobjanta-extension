<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SobJanta AI</title>
  <style>
    body {
      width: 340px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #1a1a1c;
      color: #e5e5e5;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 16px 0;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background-color: #3b82f6;
      border: 1px solid #2563eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }

    button:hover {
      background-color: #2563eb;
      box-shadow: 0 6px 8px -1px rgba(0, 0, 0, 0.3);
    }

    button:active {
      transform: translateY(1px);
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #a3a3a3;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>

<body>
  <h1>SobJanta AI</h1>
  <button id="explainBtn">Explain This Page</button>
  <div id="status"></div>
  <script type="module" src="popup.js"></script>
</body>

</html>
