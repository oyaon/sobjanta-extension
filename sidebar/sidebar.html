<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobJanta Sidebar</title>
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e5e5e5;
        }

        h2 {
            font-size: 18px;
            margin-top: 0;
            color: #ffffff;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .section {
            margin-bottom: 16px;
        }

        .section-title {
            font-weight: 600;
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content-box {
            background-color: #1e1e1e;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
        }

        ul {
            margin: 0;
            padding-left: 20px;
        }

        li {
            margin-bottom: 6px;
        }
    </style>
</head>

<body>
    <h2>SobJanta AI</h2>

    <div class="section">
        <div class="section-title">Topic</div>
        <div class="content-box" id="topicContent">Awaiting analysis...</div>
    </div>

    <div class="section">
        <div class="section-title">Summary</div>
        <div class="content-box" id="summaryContent">Awaiting analysis...</div>
    </div>

    <div class="section">
        <div class="section-title">Key Points</div>
        <div class="content-box" id="keyPointsContent">
            <ul id="keyPointsList">
                <li>Awaiting analysis...</li>
            </ul>
        </div>
    </div>

    <script type="module" src="sidebar.js"></script>
</body>

</html>
